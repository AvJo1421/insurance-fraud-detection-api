<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Fraud Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #1c0a2e;
            color: white;
            padding: 40px 20px;
        }

        .container { max-width: 700px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 36px; }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(90deg, #f97316, #ec4899, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p { color: #9ca3af; font-size: 0.95rem; }

        .card {
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.03);
        }

        .badge {
            background: rgba(249,115,22,0.15);
            color: #f97316;
            border: 1px solid rgba(249,115,22,0.4);
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }

        label {
            font-size: 10px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(124,58,237,0.4);
            border-radius: 8px;
            padding: 10px 12px;
            color: #f3f4f6;
            font-size: 0.9rem;
            transition: border 0.2s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #ec4899;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #f97316, #ec4899, #7c3aed);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #result {
            display: none;
            text-align: center;
            padding: 28px;
            border-radius: 16px;
            margin-top: 16px;
            animation: fadeIn 0.5s ease;
        }

        .fraud {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.5);
        }

        .not-fraud {
            background: rgba(0,255,136,0.08);
            border: 1px solid rgba(0,255,136,0.4);
        }

        #result-icon { font-size: 2.5rem; margin-bottom: 10px; }

        #result-text {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .fraud #result-text { color: #f87171; }
        .not-fraud #result-text { color: #00ff88; }

        #result-prob {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        #explanation {
            display: none;
            margin-top: 12px;
            padding: 16px 20px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            color: #d1d5db;
            line-height: 1.6;
            text-align: left;
        }

        #explanation .exp-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7c3aed;
            margin-bottom: 8px;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Insurance Fraud Detector</h1>
            <p>Powered by Machine Learning + AI — Enter claim details to detect fraud</p>
        </div>

        <div class="card">
            <span class="badge">POLICY DETAILS</span>
            <div class="grid">
                <div class="form-group">
                    <label>Months as customer</label>
                    <input type="number" id="months_as_customer" value="120">
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" value="45">
                </div>
                <div class="form-group">
                    <label>Policy deductable</label>
                    <input type="number" id="policy_deductable" value="1000">
                </div>
                <div class="form-group">
                    <label>Annual premium</label>
                    <input type="number" id="policy_annual_premium" value="1400">
                </div>
            </div>
        </div>

        <div class="card">
            <span class="badge">INCIDENT DETAILS</span>
            <div class="grid">
                <div class="form-group">
                    <label>Incident hour of day</label>
                    <input type="number" id="incident_hour_of_the_day" value="14">
                </div>
                <div class="form-group">
                    <label>Vehicles involved</label>
                    <input type="number" id="number_of_vehicles_involved" value="1">
                </div>
                <div class="form-group">
                    <label>Bodily injuries</label>
                    <input type="number" id="bodily_injuries" value="1">
                </div>
                <div class="form-group">
                    <label>Witnesses</label>
                    <input type="number" id="witnesses" value="2">
                </div>
            </div>
        </div>

        <div class="card">
            <span class="badge">CLAIM DETAILS</span>
            <div class="grid">
                <div class="form-group">
                    <label>Total claim amount</label>
                    <input type="number" id="total_claim_amount" value="70000">
                </div>
                <div class="form-group">
                    <label>Injury claim</label>
                    <input type="number" id="injury_claim" value="7000">
                </div>
                <div class="form-group">
                    <label>Property claim</label>
                    <input type="number" id="property_claim" value="13000">
                </div>
                <div class="form-group">
                    <label>Vehicle claim</label>
                    <input type="number" id="vehicle_claim" value="50000">
                </div>
                <div class="form-group">
                    <label>Auto year</label>
                    <input type="number" id="auto_year" value="2015">
                </div>
            </div>
        </div>

        <button onclick="predict()" id="btn">ANALYZE FOR FRAUD</button>

        <div id="result">
            <div id="result-icon"></div>
            <div id="result-text"></div>
            <div id="result-prob"></div>
        </div>

        <div id="explanation">
            <div class="exp-title">AI Analysis</div>
            <div id="explanation-text"></div>
        </div>
    </div>

    <script>
        async function predict() {
            const btn = document.getElementById('btn');
            btn.textContent = 'ANALYZING...';
            btn.disabled = true;

            const data = {
                months_as_customer: parseInt(document.getElementById('months_as_customer').value),
                age: parseInt(document.getElementById('age').value),
                policy_state: 1,
                policy_csl: 1,
                policy_deductable: parseInt(document.getElementById('policy_deductable').value),
                policy_annual_premium: parseFloat(document.getElementById('policy_annual_premium').value),
                umbrella_limit: 0,
                insured_sex: 1,
                insured_education_level: 1,
                insured_occupation: 1,
                insured_hobbies: 1,
                insured_relationship: 1,
                capital_gains: 0,
                capital_loss: 0,
                incident_type: 1,
                collision_type: 1,
                incident_severity: 1,
                authorities_contacted: 1,
                incident_state: 1,
                incident_city: 1,
                incident_hour_of_the_day: parseInt(document.getElementById('incident_hour_of_the_day').value),
                number_of_vehicles_involved: parseInt(document.getElementById('number_of_vehicles_involved').value),
                property_damage: 1,
                bodily_injuries: parseInt(document.getElementById('bodily_injuries').value),
                witnesses: parseInt(document.getElementById('witnesses').value),
                police_report_available: 1,
                total_claim_amount: parseInt(document.getElementById('total_claim_amount').value),
                injury_claim: parseInt(document.getElementById('injury_claim').value),
                property_claim: parseInt(document.getElementById('property_claim').value),
                vehicle_claim: parseInt(document.getElementById('vehicle_claim').value),
                auto_make: 1,
                auto_model: 1,
                auto_year: parseInt(document.getElementById('auto_year').value)
            };

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const resultDiv = document.getElementById('result');
            const explanationDiv = document.getElementById('explanation');
            resultDiv.style.display = 'block';
            explanationDiv.style.display = 'block';

            if (result.fraud_predicted === 1) {
                resultDiv.className = 'fraud';
                document.getElementById('result-icon').textContent = '🚨';
                document.getElementById('result-text').textContent = 'FRAUD DETECTED';
                document.getElementById('result-prob').textContent = 'Confidence: ' + (result.probability * 100).toFixed(1) + '%';
            } else {
                resultDiv.className = 'not-fraud';
                document.getElementById('result-icon').textContent = '✅';
                document.getElementById('result-text').textContent = 'CLAIM APPEARS LEGITIMATE';
                document.getElementById('result-prob').textContent = 'Confidence: ' + (result.probability * 100).toFixed(1) + '%';
            }

            document.getElementById('explanation-text').textContent = result.explanation;

            btn.textContent = 'ANALYZE FOR FRAUD';
            btn.disabled = false;
        }
    </script>
</body>
</html>
